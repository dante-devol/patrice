name: Release

# Cut a release by pushing a semver tag:  git tag v1.4.0 && git push --tags
# Builds + pushes the web and api images to GHCR and creates a GitHub Release
# carrying the deploy bundle (compose file + .env.example + runbook). The image
# builds compile both tiers (nest build / ng build), so a broken tag fails here.
on:
  push:
    tags: ['v*.*.*']

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # create the GitHub Release
  packages: write # push images to GHCR

jobs:
  images:
    name: build + push ${{ matrix.tier }} image
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tier: [api, web]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.tier }}
          # {{version}} -> 1.4.0, plus 1.4; `latest` auto-added for non-prerelease tags.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.tier }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.tier }}
          cache-to: type=gha,mode=max,scope=${{ matrix.tier }}

  release:
    name: create GitHub Release
    needs: images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package deploy bundle
        run: |
          version="${GITHUB_REF_NAME#v}"
          zip -j "patrice-deploy-${version}.zip" \
            deploy/docker-compose.prod.yml \
            deploy/.env.example \
            deploy/README.md

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          prerelease=""
          case "$version" in *-*) prerelease="--prerelease";; esac
          gh release create "$GITHUB_REF_NAME" \
            "patrice-deploy-${version}.zip" \
            --title "Patrice $version" \
            --generate-notes \
            $prerelease
