server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Proxy every API call (single /api/* prefix) to the api service — same-origin
  # from the browser's view, so session + CSRF cookies travel without cross-site
  # concerns. Unknown /api paths return the API's JSON 404, not the SPA shell.
  location /api/ {
    proxy_pass http://api:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA fallback.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
